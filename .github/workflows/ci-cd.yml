name: CI/CD - train & predict

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || pip install pandas numpy scikit-learn xgboost joblib jupyter nbconvert

      - name: List files (debug)
        run: ls -lah

      - name: Run training notebook
        run: |
          jupyter nbconvert --to notebook --execute cust1_train.ipynb --output result_train.ipynb

      - name: Run prediction notebook
        run: |
          jupyter nbconvert --to notebook --execute cust1_prediction.ipynb --output result_prediction.ipynb

      - name: Show resulting files (debug)
        run: ls -lah

      - name: Upload prediction CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: churn_predictions
          path: cust1_churn_predictions.csv
